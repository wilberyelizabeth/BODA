<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirmación de Asistencia</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url('https://images.unsplash.com/photo-1519741497674-611481863552?q=80&w=1974&auto=format&fit=crop') no-repeat center center/cover;
position:relative;
overflow:auto;
}

body::before{
content:'';
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
backdrop-filter:blur(2px);
}

.container{
position:relative;
width:90%;
max-width:500px;
background:rgba(255,255,255,0.15);
padding:40px;
border-radius:25px;
backdrop-filter:blur(12px);
color:white;
box-shadow:0 8px 32px rgba(0,0,0,0.3);
animation:fade 1.2s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

h1{
text-align:center;
margin-bottom:10px;
font-size:2rem;
}

p{
text-align:center;
margin-bottom:30px;
font-weight:300;
}

label{
display:block;
margin-bottom:8px;
margin-top:15px;
font-weight:600;
}

input, select{
width:100%;
padding:12px;
border:none;
border-radius:12px;
outline:none;
font-size:1rem;
margin-bottom:10px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:15px;
background:white;
color:#b76e79;
font-size:1rem;
font-weight:bold;
cursor:pointer;
transition:0.3s;
margin-top:10px;
}

button:hover{
transform:scale(1.03);
background:#ffeef2;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<div class="container">

<h1>💍 Nuestra Celebración 💍</h1>

<p>
Nos llena de alegría compartir este momento tan especial contigo ✨
</p>

<form>

<label>👤 Nombres y Apellidos</label>
<input type="text" placeholder="Escribe aquí">

<label>💌 ¿De parte de quién nos acompañas?</label>

<select>
<option>Selecciona una opción</option>
<option>Novia 👰</option>
<option>Novio 🤵</option>
</select>

<label>🎉 ¿Nos acompañarás?</label>
<select id="asistencia">
<option>Selecciona una opción</option>
<option>Sí, ahí estaré 💖</option>
<option>No podré asistir</option>
</select>

<label>❤️ ¿Asistirás con pareja?</label>
<select id="pareja" onchange="mostrarPareja()">
<option>Selecciona una opción</option>
<option>Sí</option>
<option>No</option>
</select>

<div id="campoPareja" class="hidden">

<label>👥 Nombre y apellido de tu pareja</label>
<input type="text" placeholder="Nombre de tu pareja">

</div>

<button type="submit">
Confirmar asistencia ✨
</button>

</form>

</div>

<script>

function mostrarPareja(){

let pareja=document.getElementById("pareja").value;
let campo=document.getElementById("campoPareja");

if(pareja==="Sí"){
campo.classList.remove("hidden");
}else{
campo.classList.add("hidden");
}

}

</script>

</body>
</html>
