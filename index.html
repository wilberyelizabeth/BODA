<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirmación de Asistencia</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url('WB.jpeg') no-repeat center center;
background-size: 60%;
background-color: black;
position:relative;
overflow:auto;
}

body::before{
content:'';
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
backdrop-filter:blur(2px);
}

.container{
position:relative;
width:90%;
max-width:500px;
background:rgba(255,255,255,0.15);
padding:40px;
border-radius:25px;
backdrop-filter:blur(12px);
color:white;
box-shadow:0 8px 32px rgba(0,0,0,0.3);
animation:fade 1.2s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

h1{
text-align:center;
margin-bottom:10px;
font-size:2rem;
}

p{
text-align:center;
margin-bottom:30px;
font-weight:300;
}

label{
display:block;
margin-bottom:8px;
margin-top:15px;
font-weight:600;
}

input, select{
width:100%;
padding:12px;
border:none;
border-radius:12px;
outline:none;
font-size:1rem;
margin-bottom:10px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:15px;
background:white;
color:#b76e79;
font-size:1rem;
font-weight:bold;
cursor:pointer;
transition:0.3s;
margin-top:10px;
}

button:hover{
transform:scale(1.03);
background:#ffeef2;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<div class="container">

<h1>💍 Nuestra Celebración 💍</h1>

<p>
Nos llena de alegría compartir este momento tan especial contigo ✨
</p>

<form id="formulario">

<label>👤 Nombre y Apellido</label>
<input type="text" id="nombre" placeholder="Escribe aquí" required>

<label>💌 ¿De parte de quién nos acompañas?</label>
<select id="deParte" required>
<option value="">Selecciona una opción</option>
<option>Elizabeth 👰</option>
<option>Wilber 🤵</option>
</select>

<label>🎉 ¿Nos acompañarás?</label>
<select id="asistencia" required>
<option value="">Selecciona una opción</option>
<option>Sí, ahí estaré 💖</option>
<option>No podré asistir</option>
</select>

<label>❤️ ¿Asistirás con pareja?</label>
<select id="pareja" onchange="mostrarPareja()" required>
<option value="">Selecciona una opción</option>
<option>Sí</option>
<option>No</option>
</select>

<div id="campoPareja" class="hidden">
<label>👥 Nombre y apellido de tu pareja</label>
<input type="text" id="nombrePareja" placeholder="Nombre de tu pareja">
</div>

<button type="submit">Confirmar asistencia ✨</button>

</form>

<script>
const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbzN7TAC4nR8GmLayABGkuWZKnWUOM1o1ctfGK_Bmqt6bzp6VFWPzyUY91bt9BNl7zx1Hw/exec";

function mostrarPareja(){
  const pareja = document.getElementById("pareja").value;
  const campo = document.getElementById("campoPareja");

  if(pareja === "Sí"){
    campo.classList.remove("hidden");
  } else {
    campo.classList.add("hidden");
    document.getElementById("nombrePareja").value = "";
  }
}

document.getElementById("formulario").addEventListener("submit", function(e){
  e.preventDefault();

  const datos = {
    nombre: document.getElementById("nombre").value,
    deParte: document.getElementById("deParte").value,
    asistencia: document.getElementById("asistencia").value,
    pareja: document.getElementById("pareja").value,
    nombrePareja: document.getElementById("nombrePareja").value
  };

  fetch(URL_SCRIPT, {
    method: "POST",
    body: JSON.stringify(datos)
  })
  .then(() => {
    alert("¡Gracias! Tu confirmación fue registrada 💖");
    document.getElementById("formulario").reset();
    document.getElementById("campoPareja").classList.add("hidden");
  })
  .catch(() => {
    alert("Ocurrió un error. Intenta nuevamente.");
  });
});
</script>
</body>
</html>
